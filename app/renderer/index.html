<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<title>VigilMask</title>
<style>
  :root {
    --sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Mono', 'Consolas', ui-monospace, monospace;
    --teal: #3fd6b2;
    --red: #c94040;
    --amber: #d6a83f;
    --grey: #6f8496;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0a1420;
    font-family: var(--sans);
    overflow: hidden;
    user-select: none;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #0d1a28;
  }

  .header {
    background: #10202f;
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex: none;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #2fd6a7, #1a9a7d);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-icon svg { width: 18px; height: 18px; }
  .brand-name { font-size: 17px; font-weight: 600; color: #eef4f5; letter-spacing: 0.2px; }
  .header-meta {
    display: flex; gap: 18px; margin-top: 10px;
    font-size: 12px; color: var(--grey); font-family: var(--mono);
  }
  .header-meta span b { color: #9fb0bf; font-weight: 500; }

  .brain-stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 150px;
    background: radial-gradient(circle at 50% 42%, #14283a 0%, #0c1c2a 55%, #081420 100%);
    overflow: hidden;
  }
  #brainCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .stage-label {
    position: absolute; bottom: 12px; left: 0; right: 0;
    text-align: center; font-family: var(--mono);
    font-size: 11px; color: #4d6577; letter-spacing: 0.3px;
    pointer-events: none;
  }

  .panel {
    position: relative;
    flex: none;
    margin: -34px 14px 14px;
    background: #101f2c;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 16px 18px 14px;
  }

  .status-row {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .status-label {
    display: flex; align-items: center; gap: 7px;
    font-weight: 600; font-size: 13.5px; letter-spacing: 0.4px;
    color: var(--teal);
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .app[data-state="paused"] .status-label { color: var(--red); }
  .app[data-state="degraded"] .status-label { color: var(--amber); }
  .app[data-state="connecting"] .status-label { color: var(--grey); }
  .app[data-state="connecting"] .status-dot { animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: 0.25; } }

  .chevron { color: #4d6577; transition: transform 0.25s; }
  .app.drawer-open .chevron { transform: rotate(180deg); }

  .main-line { margin-top: 8px; font-size: 18px; font-weight: 600; color: #eef4f5; }
  .sub-line { margin-top: 4px; font-family: var(--mono); font-size: 12px; color: #5b7385; }

  .badge {
    display: inline-flex; margin-top: 12px; padding: 5px 12px;
    border-radius: 20px; border: 1px solid rgba(255,255,255,0.12);
    font-size: 12px; color: #9fb0bf;
  }

  /* Ledger drawer */
  .drawer {
    max-height: 0; overflow: hidden auto;
    transition: max-height 0.25s ease;
    margin: 0 -6px;
  }
  .app.drawer-open .drawer { max-height: 190px; margin-top: 12px; }
  .ledger-empty {
    font-family: var(--mono); font-size: 12px; color: #4d6577;
    padding: 10px 6px;
  }
  .ledger-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 6px; border-radius: 8px;
    font-family: var(--mono); font-size: 12px;
  }
  .ledger-row:hover { background: rgba(255,255,255,0.03); }
  .ledger-token { color: var(--teal); flex: none; }
  .ledger-cat { color: #5b7385; flex: none; font-size: 10.5px; }
  .ledger-value {
    color: #9fb0bf; margin-left: auto; cursor: pointer;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ledger-value.hidden-value { color: #4d6577; letter-spacing: 2px; }
  .drawer-actions { display: flex; justify-content: flex-end; padding: 6px; }
  .clear-btn {
    background: none; border: none; cursor: pointer;
    font-family: var(--mono); font-size: 11.5px; color: #5b7385;
  }
  .clear-btn:hover { color: var(--red); }

  .stats-row { display: flex; gap: 10px; margin-top: 12px; }
  .stat { flex: 1; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 9px 12px; }
  .stat-num { font-size: 17px; font-weight: 600; color: #eef4f5; }
  .stat-label { font-size: 11px; color: #5b7385; margin-top: 2px; }

  .action-btn {
    width: 100%; margin-top: 12px; padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #eef4f5; font-family: var(--sans);
    font-weight: 500; font-size: 14px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .action-btn:hover:not(:disabled) { background: rgba(255,255,255,0.07); }
  .action-btn svg { width: 16px; height: 16px; color: var(--grey); }

  .pause-btn {
    width: 100%; margin-top: 10px; padding: 12px;
    border-radius: 10px; border: none;
    background: var(--red); color: #fff;
    font-family: var(--sans); font-weight: 600; font-size: 14px;
    cursor: pointer;
  }
  .pause-btn.resume { background: #1a9a7d; }
  .pause-btn:hover:not(:disabled) { filter: brightness(1.1); }

  button:disabled { opacity: 0.45; cursor: default; }
</style>
</head>
<body>

<div class="app" id="app" data-state="connecting">

  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#08201a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 L20 6 V12 C20 17 16.5 20.5 12 22 C7.5 20.5 4 17 4 12 V6 Z" fill="#08201a" fill-opacity="0.15"/>
            <path d="M9 12 L11 14 L15.5 9.5" />
          </svg>
        </div>
        <div class="brand-name">VigilMask</div>
      </div>
    </div>
    <div class="header-meta">
      <span>Mode: <b>Desktop daemon</b></span>
      <span>Engine: <b id="engineMeta">—</b></span>
    </div>
  </div>

  <div class="brain-stage">
    <canvas id="brainCanvas"></canvas>
    <div class="stage-label">nothing leaves this device</div>
  </div>

  <div class="panel">
    <div class="status-row" id="statusRow" title="Show session ledger">
      <div class="status-label"><span class="status-dot"></span><span id="statusText">CONNECTING</span></div>
      <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="main-line" id="mainLine">Waiting for local daemon…</div>
    <div class="sub-line" id="subLine">starting python on 127.0.0.1:8787</div>

    <div class="drawer" id="drawer">
      <div id="ledgerList"><div class="ledger-empty">nothing masked yet this session</div></div>
      <div class="drawer-actions">
        <button class="clear-btn" id="clearBtn">wipe session mappings</button>
      </div>
    </div>

    <div class="badge">Zero data retention</div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-num" id="maskedStat">0</div>
        <div class="stat-label">masked</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="rawStat">0</div>
        <div class="stat-label">sent raw</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="turnsStat">0</div>
        <div class="stat-label">turns</div>
      </div>
    </div>

    <button class="action-btn" id="engineBtn" disabled>
      <span id="engineBtnText">Switch engine</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h5M20 20v-5h-5"/><path d="M4 9a8 8 0 0 1 14.7-3M20 15a8 8 0 0 1-14.7 3"/></svg>
    </button>

    <button class="pause-btn" id="pauseBtn" disabled>Pause protection</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
